    const allPersonalityKeys = ["MYKN","LISA","AAO","OTae","HLSY","HKN","MASK","CHU2","LOCK","AMITA","ARISA","MMSK","TMRIN","UIKA","OBIV","TKSM","MRAN","SOYO","MOCA","ANON","NYAM","EVE","RUI","SH1RO","HINA","KDHR","MGGM","YKLS","JTTY","RANA"];
    allPersonalityKeys.forEach(k => scores[k] = 0);
    let virtualCount = 0;
    let memeCount = 0;
    let showExtraQuestion = false;
    let extraAnswer = null;
    let radarChart = null;

    const quizBody = document.getElementById("quizBody");

    function renderIntro() {
        const introHTML = `
            <div class="intro-text">
                <p style="font-size:1.2rem; font-weight:bold;"> 欢迎参加 BDTI 邦多利人格测试</p>
                <p>本测试共30题，根据你的选择将匹配出最适合你的邦多利角色人格。</p>
                <p>题目均为日常情景，请凭第一感觉作答，无需过多思考。</p>
                <p>✨ 纯属娱乐，请勿深究。 ✨</p>
            </div>
            <button class="start-btn" id="startTestBtn">开始测试 </button>
        `;
        quizBody.innerHTML = introHTML;
        document.getElementById("startTestBtn").addEventListener("click", () => {
            testStarted = true;
            initTest();
        });
    }

    function initTest() {
        userAnswers.fill(null);
        currentIndex = 0;
        scores = {};
        allPersonalityKeys.forEach(k => scores[k] = 0);
        virtualCount = 0;
        memeCount = 0;
        showExtraQuestion = false;
        extraAnswer = null;
        renderQuestion();
    }

    function renderQuestion() {
        if (currentIndex < 30) {
            const q = QUESTIONS[currentIndex];
            const opts = OPTIONS[currentIndex];
            const selected = userAnswers[currentIndex];
            const progressPercent = (currentIndex / 30) * 100;

            let optionsHtml = "";
            opts.forEach((opt, idx) => {
                const isSelected = (selected === idx);
                const styleBg = isSelected ? "background:#ffedd5; border-color:#ff8c42;" : "";
                optionsHtml += `<button class="option-btn" style="${styleBg}" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;
            });

            const template = `
                <div class="progress-area">
                    <div class="progress-text">
                        <span>第 ${currentIndex+1} / 30 题</span>
                        <span>BanG Dream Type Indicator</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                    </div>
                </div>
                <div class="question-text">${q}</div>
                <div class="options-list" id="optionsList">
                    ${optionsHtml}
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.5"' : ''}>◀ 上一题</button>
                    <button class="nav-btn primary" id="nextBtn">${currentIndex === 29 ? '✨ 完成' : '下一题 ▶'}</button>
                </div>
            `;
            quizBody.innerHTML = template;

            document.querySelectorAll(".option-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const idx = parseInt(btn.dataset.optIndex);
                    selectOption(currentIndex, idx);
                });
            });
            document.getElementById("prevBtn")?.addEventListener("click", () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderQuestion();
                }
            });
            document.getElementById("nextBtn")?.addEventListener("click", () => {
                if (userAnswers[currentIndex] === null) {
                    alert("现在是答题呢，严肃点！");
                    return;
                }
                if (currentIndex === 29) {
                    finalizeTest();
                } else {
                    currentIndex++;
                    renderQuestion();
                }
            });
        } else if (currentIndex === 30 && showExtraQuestion) {
            const extraOpts = [
                "直接用自己的真名或者习惯的名字", "随便起一个，无所谓",
                "你鬼使神差，起了一个带有格式的团体名",
                "你想了一想，起了一个恰好五个字的名字"
            ];
            let optionsHtml = "";
            extraOpts.forEach((opt, idx) => {
                optionsHtml += `<button class="option-btn" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;
            });
            const template = `
                <div class="question-text">假如你要在社交平台注册一个账号，你会起什么样的名字？</div>
                <div class="options-list" id="extraOptions">${optionsHtml}</div>
                <div class="nav-buttons"><button class="nav-btn primary" id="finishExtra" disabled>确定</button></div>
            `;
            quizBody.innerHTML = template;
            const extraBtns = document.querySelectorAll("#extraOptions .option-btn");
            extraBtns.forEach(btn => {
                btn.addEventListener("click", (e) => {
                    extraBtns.forEach(b => b.style.background = "");
                    btn.style.background = "#ffedd5";
                    btn.style.borderColor = "#ff8c42";
                    const idx = parseInt(btn.dataset.optIndex);
                    extraAnswer = idx;
                    document.getElementById("finishExtra").disabled = false;
                });
            });
            document.getElementById("finishExtra").addEventListener("click", () => {
                if (extraAnswer === null) {
                    alert("请先选择一个选项～");
                    return;
                }
               let finalPersonality = null;
if (memeCount >= 2) {
    if (extraAnswer === 2) finalPersonality = "WUDI";
    else if (extraAnswer === 3) finalPersonality = "FIVEZ";
} else {
    // 即使 memeCount 不足，也有10%惊喜概率
    if (extraAnswer === 2 && Math.random() < 0.1) finalPersonality = "WUDI";
    else if (extraAnswer === 3 && Math.random() < 0.1) finalPersonality = "FIVEZ";
}
if (finalPersonality) {
    showResult(finalPersonality);
} else {
    const top = getTopPersonality();
    showResult(top);
}
            });
        } else {
            const top = getTopPersonality();
            showResult(top);
        }
    }

    function selectOption(qIdx, optIdx) {
        userAnswers[qIdx] = optIdx;
        const addList = SCORING[qIdx][optIdx];
        addList.forEach(p => {
            if (scores[p] !== undefined) scores[p] += 2;
            else console.warn("未知人格", p);
        });
        if ((qIdx === 14 || qIdx === 19 || qIdx === 24) && optIdx === 0) virtualCount++;
        if (isMemeOption(qIdx, optIdx)) memeCount++;
        renderQuestion();
    }

   function finalizeTest() {
    // PJSK 触发条件放宽：2题A就有20%概率
    if (virtualCount === 3) {
        showResult("PJSK");
        return;
    }
    if (virtualCount === 2 && Math.random() < 0.1) {
        showResult("PJSK");
        return;
    }
    // 玩梗条件从 >=3 降为 >=2
    if (memeCount >= 2) {
        showExtraQuestion = true;
        currentIndex = 30;
        renderQuestion();
        return;
    }
    // 正常加权结果
    const top = getTopPersonality();
    // YKLS 彩蛋（仍然使用原始得分）
    const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    const top3Keys = sorted.slice(0,3).map(item => item[0]);
    if (top3Keys.includes("MYKN") && top3Keys.includes("LISA") && Math.random() < 0.2) {
        showResult("YKLS");
        return;
    }
    showResult(top);
}

    const PERSONALITY_APPEARANCES = {
    MYKN:19, LISA:16, ANON:15, MOCA:14, RANA:14, TMRIN:13, ARISA:11, AAO:10, RUI:10,
    OBIV:9, HLSY:9, KDHR:8, MASK:8, CHU2:8, LOCK:8, YKLS:8, JTTY:7, EVE:7, SOYO:7,
    SH1RO:6, HINA:5, AMITA:4, OTae:4, HKN:4, UIKA:4, MRAN:4, NYAM:3, MMSK:3, MGGM:3
};

function getTopPersonality() {
    let maxWeightedScore = -1;
    let topKey = null;
    for (let [k, rawScore] of Object.entries(scores)) {
        const appearances = PERSONALITY_APPEARANCES[k] || 1;
        const weightedScore = rawScore / appearances;
        if (weightedScore > maxWeightedScore) {
            maxWeightedScore = weightedScore;
            topKey = k;
        }
    }
    return topKey;
}
    function showResult(personalityKey) {
        const p = PERSONALITIES[personalityKey];
        const details = PERSONALITY_DETAILS[personalityKey] || { shortIntro: "简介", detail: "解析", dimensions: [5,5,5,5,5,5] };
        if (!p) { alert("结果错误，请重试"); location.reload(); return; }
  const resultHTML = `
    <div class="result-card">
        <div class="result-image">
            <img src="${details.image}" alt="${p.name}" style="width:100%; height:100%; object-fit:cover; border-radius:20px;">
            <div style="display:none; align-items:center; justify-content:center; width:100%; height:100%; background:#f0d5bc; border-radius:50%; font-size:3rem;">${p.emoji}</div>
        </div>
        <div class="result-title">${p.name}</div>
        <div class="result-short-intro">${details.shortIntro}</div>
        <div class="radar-container"><canvas id="radarCanvas" width="300" height="300"></canvas></div>
        <div class="result-detail">${details.detail}</div>
        <div>
            <button class="share-btn" id="shareBtn">📸 分享结果</button>
            <button class="retake-btn" id="retakeBtn">🔄 重新测试</button>
        </div>
    </div>
`;
        quizBody.innerHTML = resultHTML;
        const ctx = document.getElementById('radarCanvas').getContext('2d');
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ["认真", "外向", "感性", "整活", "妈妈度", "反差"],
                datasets: [{
                    label: '维度', data: details.dimensions, backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderColor: 'rgba(255, 99, 132, 1)', borderWidth: 2, pointBackgroundColor: 'rgba(255, 99, 132, 1)',
                    pointBorderColor: '#fff', pointRadius: 4
                }]
            },
            options: { scales: { r: { beginAtZero: true, max: 10, ticks: { stepSize: 2 } } }, plugins: { tooltip: { enabled: true }, legend: { display: false } } }
        });
        document.getElementById("shareBtn")?.addEventListener("click", () => {
            const text = `【BDTI邦多利人格测试】我已经确诊为 ${p.name} ${p.emoji}\n你也来试试吧！网站地址:https://yukinamnt.github.io/BDTI-Test/`;
            navigator.clipboard.writeText(text).then(() => alert("诊断结果已复制，可以发送给医生了哦~")).catch(() => alert("手动截图分享吧"));
        });
        document.getElementById("retakeBtn")?.addEventListener("click", () => { testStarted = false; renderIntro(); });
    }

    renderIntro();
</script>
</body>
